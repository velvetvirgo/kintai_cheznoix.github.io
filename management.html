<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d1f1a" />
  <title>勤怠管理 — 管理画面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Josefin+Sans:wght@300;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d1f1a; --surface:  #132b24; --surface2: #1a3a30;
      --border:   #25503f; --accent:   #4ecca3; --accent2:  #2ea882;
      --gold:     #f0c060; --red:      #e05c6a; --amber:    #f0a040;
      --text:     #d4efe6; --muted:    #5a8a76; --radius:   14px;
      --shadow:   0 8px 32px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; padding-bottom: 60px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    h1 { font-family: 'Josefin Sans', sans-serif; font-size: 24px; color: var(--accent); letter-spacing: 1px; }
    
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 2px; }
    .tab-btn { background: none; border: none; color: var(--muted); padding: 8px 16px; font-size: 15px; font-weight: 500; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; }
    .tab-btn:hover { color: var(--text); background: var(--surface); }
    .tab-btn.active { color: var(--accent); background: var(--surface2); border-bottom: 2px solid var(--accent); margin-bottom: -4px; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
    
    .form-group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
    label { font-size: 13px; color: var(--muted); font-weight: 500; }
    input[type="text"], input[type="number"], input[type="date"], select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    
    button {
      background: var(--accent); color: var(--bg); border: none; padding: 8px 16px;
      border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    button:hover { background: var(--accent2); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.btn-amber { background: var(--amber); color: var(--bg); }
    button.btn-amber:hover { background: #d88f35; }
    button.btn-red { background: var(--red); color: #fff; }
    button.btn-red:hover { background: #c54b58; }
    button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: left; }
    th { background: var(--surface2); color: var(--muted); font-weight: 500; padding: 10px 12px; border-bottom: 2px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* テーブル内インプット最適化 */
    td input[type="text"], td input[type="number"], td select { width: 100%; padding: 5px 8px; font-size: 13px; }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-top: 16px; }
    .sum-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .sum-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .sum-val { font-size: 20px; font-family: 'Josefin Sans', sans-serif; font-weight: 700; color: var(--accent); }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--accent); color: var(--bg); padding: 12px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); color: #fff; }

    .sync-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .sync-badge.synced { background: var(--accent); }
    .mono { font-family: 'DM Mono', monospace; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>ATTENDANCE MANAGEMENT</h1>
  <div style="font-size: 12px; color: var(--muted);" id="connection-status">GAS未設定</div>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('calc-tab', this)">給与計算</button>
  <button class="tab-btn" onclick="switchTab('master-tab', this)">従業員マスタ設定</button>
  <button class="tab-btn" onclick="switchTab('records-tab', this)">打刻データ照会</button>
</div>

<div id="calc-tab" class="tab-content active">
  <div class="card">
    <div class="card-title">📅 対象期間指定・データ集計</div>
    <div class="form-group">
      <label>GAS WebアプリURL:</label>
      <input type="text" id="att-gas-url" style="width: 320px;" placeholder="https://script.google.com/macros/s/.../exec">
      <button onclick="saveGasUrl()">接続保存</button>
    </div>
    <div class="form-group">
      <label>期間:</label>
      <input type="date" id="fetch-from">
      <span>〜</span>
      <input type="date" id="fetch-to">
      <button class="btn-amber" id="btn-fetch" onclick="fetchAndCalculate()">📡 記録取得 & 集計実行</button>
    </div>
  </div>

  <div class="card" id="calc-result-card" style="display: none;">
    <div class="card-title" style="justify-content: space-between;">
      <span>📊 給与計算結果一覧</span>
      <button onclick="downloadCSV()">📥 CSV出力</button>
    </div>
    <div style="overflow-x: auto;">
      <table id="calc-table">
        <thead>
          <tr>
            <th>従業員名</th>
            <th>出勤日数</th>
            <th>総労働時間</th>
            <th>基本給</th>
            <th>深夜手当</th>
            <th>休日手当</th>
            <th>休深手当</th>
            <th>交通費</th>
            <th>総支給額</th>
          </tr>
        </thead>
        <tbody id="calc-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="master-tab" class="tab-content">
  <div class="card">
    <div class="card-title" style="justify-content: space-between;">
      <span>👥 従業員情報一覧</span>
      <div style="display:flex; gap:8px;">
        <button onclick="addMasterRow()">＋ 行追加</button>
        <button class="btn-amber" onclick="saveMasterToGAS()">💾 GASへ一括保存</button>
      </div>
    </div>
    <div style="overflow-x: auto;">
      <table id="master-table">
        <thead>
          <tr>
            <th>名前</th>
            <th>基本時給</th>
            <th>深夜手当(増分)</th>
            <th>休日手当(増分)</th>
            <th>休日深夜(増分)</th>
            <th>交通費可否</th><th>交通費単価</th><th style="width: 70px;">操作</th>
          </tr>
        </thead>
        <tbody id="master-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="records-tab" class="tab-content">
  <div class="card">
    <div class="card-title">📋 取得済打刻データ明細 (<span id="record-count">0</span>件)</div>
    <div style="overflow-x: auto; max-height: 500px;">
      <table>
        <thead>
          <tr>
            <th>従業員名</th>
            <th>勤務種別</th>
            <th>打刻種別</th>
            <th>日付</th>
            <th>打刻時刻</th>
            <th>勤務時間</th>
          </tr>
        </thead>
        <tbody id="records-tbody">
          <tr><td colspan="6" style="text-align:center; color:var(--muted);">データが未取得です。「給与計算」タブから取得してください。</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  状態管理 & 定数
// ══════════════════════════════════════════════
let db = null;
let gasUrl = '';
let masterEmployees = []; 
let fetchedRecords = [];   
let calculationResults = []; 

const DB_NAME = 'AttendanceManagementAdminDB';
const DB_VERSION = 1;

// 祝日キャッシュ (年 -> Set)
const holidayCache = {};

// ══════════════════════════════════════════════
//  IndexedDB 初期化
// ══════════════════════════════════════════════
function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = e => reject(e);
    request.onsuccess = e => { db = e.target.result; resolve(); };
    request.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('config')) d.createObjectStore('config');
    };
  });
}
function getConfig(key) {
  return new Promise(resolve => {
    const tx = db.transaction(['config'], 'readonly');
    const req = tx.objectStore('config').get(key);
    req.onsuccess = () => resolve(req.result);
  });
}
function setConfig(key, val) {
  return new Promise(resolve => {
    const tx = db.transaction(['config'], 'readwrite');
    tx.objectStore('config').put(val, key);
    tx.oncomplete = () => resolve();
  });
}

// ══════════════════════════════════════════════
//  タブ切り替え
// ══════════════════════════════════════════════
function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════════
//  GAS連携基本設定
// ══════════════════════════════════════════════
async function saveGasUrl() {
  const url = document.getElementById('att-gas-url').value.trim();
  if(!url) return showToast('URLを入力してください', 'error');
  gasUrl = url;
  localStorage.setItem('gasUrl', url);
  showToast('接続URLを保存しました');
  updateConnectionBadge(true);
  await loadMasterFromGAS();
}

function updateConnectionBadge(hasUrl) {
  const el = document.getElementById('connection-status');
  if(hasUrl) {
    el.textContent = '🟢 GAS接続設定済';
    el.style.color = 'var(--accent)';
  } else {
    el.textContent = '🔴 GAS未設定';
    el.style.color = 'var(--red)';
  }
}

// ══════════════════════════════════════════════
//  従業員マスタ ロジック
// ══════════════════════════════════════════════
async function loadMasterFromGAS() {
  if (!gasUrl) return;
  try {
    const res = await fetch(`${gasUrl}?action=get_master`);
    const obj = await res.json();
    if (obj.status === 'success') {
      masterEmployees = obj.employees || [];
      renderMasterTable();
      showToast('👥 従業員マスターを読み込みました');
    } else {
      showToast('マスター取得失敗: ' + obj.message, 'error');
    }
  } catch (e) {
    showToast('GAS通信エラー(Master)', 'error');
    console.error(e);
  }
}

// 【修正】行レンダリング部に「交通費可否」セレクトボックスを新設
function renderMasterTable() {
  const tbody = document.getElementById('master-tbody');
  tbody.innerHTML = '';

  masterEmployees.forEach((emp, index) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${emp.name || ''}" onchange="updateMaster(${index}, 'name', this.value)"></td>
      <td><input type="number" value="${emp.wage || 0}" onchange="updateMaster(${index}, 'wage', Number(this.value))"></td>
      <td><input type="number" value="${emp.nightAllowance || 0}" onchange="updateMaster(${index}, 'nightAllowance', Number(this.value))"></td>
      <td><input type="number" value="${emp.holidayAllowance || 0}" onchange="updateMaster(${index}, 'holidayAllowance', Number(this.value))"></td>
      <td><input type="number" value="${emp.holidayNightAllowance || 0}" onchange="updateMaster(${index}, 'holidayNightAllowance', Number(this.value))"></td>
      <td>
        <select onchange="updateMaster(${index}, 'transportStatus', this.value)">
          <option value="支給" ${emp.transportStatus !== '非支給' ? 'selected' : ''}>支給</option>
          <option value="非支給" ${emp.transportStatus === '非支給' ? 'selected' : ''}>非支給</option>
        </select>
      </td>
      <td><input type="number" value="${emp.transportFee || 0}" onchange="updateMaster(${index}, 'transportFee', Number(this.value))"></td>
      <td><button class="btn-red" onclick="deleteMaster(${index})">削除</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateMaster(index, field, value) {
  if (masterEmployees[index]) {
    masterEmployees[index][field] = value;
  }
}

// 【修正】デフォルト初期値に transportStatus: '支給' を明示
function addMasterRow() {
  masterEmployees.push({
    id: 'EMP_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    name: '',
    wage: 1000,
    nightAllowance: 250,
    holidayAllowance: 300,
    holidayNightAllowance: 550,
    transportStatus: '支給',
    transportFee: 0
  });
  renderMasterTable();
}

function deleteMaster(index) {
  if(confirm('この行を削除しますか？')) {
    masterEmployees.splice(index, 1);
    renderMasterTable();
  }
}

async function saveMasterToGAS() {
  if (!gasUrl) return showToast('先にGAS接続設定を行ってください', 'error');
  // バリデーション
  for(let emp of masterEmployees) {
    if(!emp.name.trim()) return showToast('名前が空の行があります', 'error');
  }

  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'save_master', employees: masterEmployees })
    });
    const obj = await res.json();
    if(obj.success) {
      showToast('💾 マスターをGAS経由でスプレッドシートに保存しました', 'success');
    } else {
      showToast('保存失敗: ' + obj.message, 'error');
    }
  } catch (e) {
    showToast('GAS保存通信エラー', 'error');
    console.error(e);
  }
}

// ══════════════════════════════════════════════
//  祝日判定 API（内閣府CSV等代替・オープンAPI経由キャッシュ）
// ══════════════════════════════════════════════
async function ensureHolidayCache(years) {
  for(const y of years) {
    if (holidayCache[y]) continue;
    try {
      const res = await fetch(`https://holidays-jp.github.io/api/v1/${y}/date.json`);
      if(res.ok) {
        const data = await res.json(); // {"YYYY-MM-DD": "祝日名"}
        holidayCache[y] = new Set(Object.keys(data));
      } else {
        holidayCache[y] = new Set();
      }
    } catch(e) {
      console.error(`祝日API取得失敗 (${y}):`, e);
      holidayCache[y] = new Set();
    }
  }
}

function isHolidayOrSunday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  if (d.getDay() === 0) return true; // 日曜日
  const y = d.getFullYear();
  if (holidayCache[y] && holidayCache[y].has(dateStr)) return true;
  return false;
}

// ══════════════════════════════════════════════
//  給与計算 コアロジック
// ══════════════════════════════════════════════
async function fetchAndCalculate() {
  if(!gasUrl) return showToast('先にGAS接続設定を行ってください', 'error');
  const from = document.getElementById('fetch-from').value;
  const to = document.getElementById('fetch-to').value;
  if(!from || !to) return showToast('期間を正しく指定してください', 'error');

  const btn = document.getElementById('btn-fetch');
  btn.disabled = true;
  btn.textContent = '⏳ 通信＆計算中...';

  try {
    // 期間内の必要年数から祝日キャッシュを確保
    const startYear = new Date(from+"T00:00:00").getFullYear();
    const endYear = new Date(to+"T00:00:00").getFullYear();
    const targetYears = [];
    for(let y=startYear; y<=endYear; y++) targetYears.push(y);
    await ensureHolidayCache(targetYears);

    // GASから打刻明細を取得
    const res = await fetch(`${gasUrl}?action=fetch_records&from=${from}&to=${to}`);
    const obj = await res.json();
    if(obj.status !== 'success') {
      showToast('データ取得エラー: ' + obj.message, 'error');
      return;
    }

    fetchedRecords = obj.records || [];
    renderRecordsTable();

    // 給与集計ロジック実行
    calculateSalary(from, to);

  } catch(e) {
    showToast('通信または計算中にエラーが発生しました', 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '📡 記録取得 & 集計実行';
  }
}

function renderRecordsTable() {
  document.getElementById('record-count').textContent = fetchedRecords.length;
  const tbody = document.getElementById('records-tbody');
  tbody.innerHTML = '';

  if(fetchedRecords.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--muted);">指定期間に一致する打刻データはありませんでした。</td></tr>`;
    return;
  }

  fetchedRecords.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><b>${r.employeeName || ''}</b></td>
      <td>${r.shift || ''}</td>
      <td>${r.punchType || ''}</td>
      <td class="mono">${r.date || ''}</td>
      <td class="mono">${r.punchTime ? r.punchTime.substring(11,16) : ''}</td>
      <td class="mono">${r.durationLabel || '-'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function calculateSalary(fromStr, toStr) {
  // 従業員名 -> 日付セット (出勤日数カウント用)
  const empActiveDays = {};
  // 従業員名 -> 手当別の集計(分)
  const empCalculations = {};

  // 初期化
  masterEmployees.forEach(m => {
    empActiveDays[m.name] = new Set();
    empCalculations[m.name] = { baseMin: 0, nightMin: 0, holMin: 0, holNightMin: 0 };
  });

  // レコード走査
  fetchedRecords.forEach(r => {
    const name = r.employeeName;
    if (!empCalculations[name]) {
      // マスターにいない従業員が打刻記録にあった場合のフォールバック枠
      empActiveDays[name] = new Set();
      empCalculations[name] = { baseMin: 0, nightMin: 0, holMin: 0, holNightMin: 0 };
    }

    if (r.date) empActiveDays[name].add(r.date);

    // 退勤(丸め計算済みの勤務時間)のみ集計
    if (r.punchType === '退勤' && r.durationMinutes) {
      const mins = Number(r.durationMinutes);
      const isHol = isHolidayOrSunday(r.date);

      if (r.shift === '深夜勤務') {
        if (isHol) {
          empCalculations[name].holNightMin += mins;
        } else {
          empCalculations[name].nightMin += mins;
        }
      } else {
        if (isHol) {
          empCalculations[name].holMin += mins;
        } else {
          empCalculations[name].baseMin += mins;
        }
      }
    }
  });

  // 金額計算
  calculationResults = [];
  Object.keys(empCalculations).forEach(name => {
    const master = masterEmployees.find(m => m.name === name) || {
      wage: 1000, nightAllowance: 250, holidayAllowance: 300, holidayNightAllowance: 550, transportStatus: '支給', transportFee: 0
    };

    const c = empCalculations[name];
    const daysCount = empActiveDays[name].size;

    // 各項目金額 (分単価換算、端数四捨五入)
    const baseAmt     = Math.round(c.baseMin * (master.wage / 60));
    const nightAmt    = Math.round(c.nightMin * ((master.wage + master.nightAllowance) / 60));
    const holAmt      = Math.round(c.holMin * ((master.wage + master.holidayAllowance) / 60));
    const holNightAmt = Math.round(c.holNightMin * ((master.wage + master.holidayNightAllowance) / 60));

    // 【修正】マスターの交通費可否判定に基づき一律・個別の支給計算。非支給なら0
    let transAmt = 0;
    if (master.transportStatus !== '非支給') {
      transAmt = daysCount * (master.transportFee || 0);
    }

    const totalHours = ((c.baseMin + c.nightMin + c.holMin + c.holNightMin) / 60).toFixed(2);
    const totalSalary = baseAmt + nightAmt + holAmt + holNightAmt + transAmt;

    calculationResults.push({
      name,
      daysCount,
      totalHours,
      baseAmt,
      nightAmt,
      holAmt,
      holNightAmt,
      transAmt,
      totalSalary
    });
  });

  renderCalcTable();
}

function renderCalcTable() {
  const tbody = document.getElementById('calc-tbody');
  tbody.innerHTML = '';
  document.getElementById('calc-result-card').style.display = 'block';

  calculationResults.forEach(res => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><b>${res.name}</b></td>
      <td class="mono">${res.daysCount}日</td>
      <td class="mono">${res.totalHours}h</td>
      <td class="mono">¥${res.baseAmt.toLocaleString()}</td>
      <td class="mono">¥${res.nightAmt.toLocaleString()}</td>
      <td class="mono">¥${res.holAmt.toLocaleString()}</td>
      <td class="mono">¥${res.holNightAmt.toLocaleString()}</td>
      <td class="mono">¥${res.transAmt.toLocaleString()}</td>
      <td class="mono" style="color:var(--gold); font-weight:700;">¥${res.totalSalary.toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  });
  showToast('📊 給与計算を完了しました', 'success');
}

function downloadCSV() {
  if(calculationResults.length === 0) return showToast('出力する計算結果がありません', 'error');
  const from = document.getElementById('fetch-from').value;
  const to = document.getElementById('fetch-to').value;

  const hdrs = ['従業員名','出勤日数','総労働時間','基本給(円)','深夜手当込み(円)','休日手当込み(円)','休日深夜手当込み(円)','交通費支給額(円)','総支給額(円)'].join(',');
  const rows = calculationResults.map(r => [
    r.name, r.daysCount, r.totalHours, r.baseAmt, r.nightAmt, r.holAmt, r.holNightAmt, r.transAmt, r.totalSalary
  ].join(','));

  const fromYear = Number(from.substring(0,4)), toYear = Number(to.substring(0,4));
  const holidayLines = [];
  for (let y = fromYear; y <= toYear; y++) {
    const days = holidayCache[y] ? [...holidayCache[y]].sort().join(' ') : '-';
    holidayLines.push(`# ${y}年 祝日: ${days}`);
  }

  const csv = '\uFEFF' + [
    `# 給与計算結果 ${from}〜${to}`,
    ...holidayLines,
    hdrs,
    ...rows
  ].join('\n');

  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })),
    download: `給与計算_${from}_${to}.csv`
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('CSVをダウンロードしました', 'success');
}

// 初期化処理
// ══════════════════════════════════════════════
(async () => {
  await initDB();
  const savedUrl = localStorage.getItem('gasUrl');
  if (savedUrl) {
    document.getElementById('att-gas-url').value = savedUrl;
    gasUrl = savedUrl;
    updateConnectionBadge(true);
    await loadMasterFromGAS();
  } else {
    updateConnectionBadge(false);
  }
  
  // 今月1日〜末日をデフォルト期間に設定
  const n = new Date();
  const yf = n.getFullYear(), mf = String(n.getMonth() + 1).padStart(2, '0');
  const lastDay = new Date(yf, n.getMonth() + 1, 0).getDate();
  document.getElementById('fetch-from').value = `${yf}-${mf}-01`;
  document.getElementById('fetch-to').value = `${yf}-${mf}-${String(lastDay).padStart(2, '0')}`;
})();

function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg; 
  el.className = 'show';
  if(type === 'error') el.classList.add('error');
  setTimeout(() => { el.className = ''; }, 3500);
}
