<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="打刻" />
  <meta name="theme-color" content="#0f1923" />
  <link rel="manifest" href="manifest.json" />
  <title>勤怠打刻アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f1923;
      --surface:   #1a2634;
      --surface2:  #243447;
      --border:    #2e4460;
      --accent:    #e8d5b7;
      --accent2:   #c9a96e;
      --day:       #4fc3a1;
      --night:     #7b8cde;
      --punch-in:  #56c987;
      --punch-out: #e06c75;
      --text:      #dde6f0;
      --muted:     #6b8299;
      --danger:    #e06c75;
      --success:   #56c987;
      --radius:    16px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(78,122,163,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,169,110,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    #app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .header-left h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem;
      letter-spacing: .08em; color: var(--accent); line-height: 1;
    }
    .header-left .subtitle { font-size: .75rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
    .clock-block { text-align: right; }
    #clock-time { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; color: var(--accent2); letter-spacing: .04em; }
    #clock-date { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* Status bar */
    .status-bar {
      display: flex; gap: 12px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; margin-bottom: 28px; font-size: .78rem;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse-dot 2s infinite; }
    .status-dot.offline { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
    .status-label { color: var(--muted); }
    .status-value { color: var(--text); font-weight: 500; }
    .status-sep { color: var(--border); }
    #unsync-count { color: var(--accent2); font-weight: 700; font-family: 'DM Mono', monospace; }

    /* Section label */
    .section-label {
      font-size: .68rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; padding-left: 4px;
    }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
      box-shadow: var(--shadow); animation: fadeUp .4s ease both;
    }

    /* Employee Management */
    .emp-add-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .emp-add-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'Noto Sans JP', sans-serif; font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    .emp-add-input:focus { border-color: var(--accent2); }
    .emp-add-input::placeholder { color: var(--muted); }
    .btn-add {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: var(--bg); border: none; border-radius: 10px; padding: 10px 20px;
      font-family: 'Noto Sans JP', sans-serif; font-size: .88rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,169,110,.3); }

    .employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .emp-item {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden; transition: border-color .2s;
      display: flex; flex-direction: column;
    }
    .emp-item.selected {
      border-color: var(--accent); background: rgba(232,213,183,.08);
      box-shadow: 0 0 12px rgba(232,213,183,.12);
    }
    .emp-name-btn {
      flex: 1; padding: 14px 12px 10px; cursor: pointer; text-align: center;
      color: var(--text); font-size: .92rem; font-weight: 500; background: none; border: none;
      font-family: 'Noto Sans JP', sans-serif; transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .emp-item.selected .emp-name-btn { color: var(--accent); }
    .emp-del-btn {
      width: 100%; padding: 5px; background: none; border: none;
      border-top: 1px solid var(--border); color: var(--muted);
      font-size: .7rem; cursor: pointer; transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .emp-del-btn:hover { background: rgba(224,108,117,.15); color: var(--danger); }
    .emp-empty { color: var(--muted); font-size: .85rem; text-align: center; padding: 20px; }

    /* Shift select */
    .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .shift-btn {
      border: 2px solid var(--border); border-radius: 14px; padding: 20px 16px;
      cursor: pointer; text-align: center; transition: all .25s; background: var(--surface2);
      -webkit-tap-highlight-color: transparent;
    }
    .shift-btn .shift-icon { font-size: 2rem; margin-bottom: 8px; }
    .shift-btn .shift-name { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    .shift-btn .shift-desc { font-size: .72rem; color: var(--muted); margin-top: 4px; }
    .shift-btn.day.selected   { border-color: var(--day);   background: rgba(79,195,161,.1);  color: var(--day);   box-shadow: 0 0 18px rgba(79,195,161,.2); }
    .shift-btn.night.selected { border-color: var(--night); background: rgba(123,140,222,.1); color: var(--night); box-shadow: 0 0 18px rgba(123,140,222,.2); }

    /* Selection summary */
    .selection-summary {
      background: var(--surface2); border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px; display: flex; gap: 12px; align-items: center; font-size: .85rem;
    }
    .sum-tag {
      background: rgba(232,213,183,.12); color: var(--accent);
      border: 1px solid rgba(232,213,183,.25); border-radius: 6px;
      padding: 4px 10px; font-weight: 500; white-space: nowrap;
    }
    .sum-tag.day   { background: rgba(79,195,161,.1);  color: var(--day);   border-color: rgba(79,195,161,.25); }
    .sum-tag.night { background: rgba(123,140,222,.1); color: var(--night); border-color: rgba(123,140,222,.25); }
    .sum-arrow { color: var(--muted); }

    /* Punch buttons */
    .punch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .punch-btn {
      border: none; border-radius: 16px; padding: 28px 20px;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      text-align: center; transition: all .2s; position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .punch-btn::before { content: ''; position: absolute; inset: 0; background: white; opacity: 0; transition: opacity .15s; }
    .punch-btn:active::before { opacity: .08; }
    .punch-btn .punch-icon  { font-size: 2.4rem; margin-bottom: 10px; display: block; }
    .punch-btn .punch-label { font-size: 1.3rem; font-weight: 700; letter-spacing: .06em; display: block; }
    .punch-btn .punch-sub   { font-size: .72rem; opacity: .7; margin-top: 6px; display: block; }
    .punch-btn.in  { background: linear-gradient(135deg, #1e4d3a, #2a6b50); color: var(--punch-in);  border: 1.5px solid rgba(86,201,135,.3); }
    .punch-btn.out { background: linear-gradient(135deg, #4d1e25, #6b2a35); color: var(--punch-out); border: 1.5px solid rgba(224,108,117,.3); }
    .punch-btn:disabled { opacity: .35; cursor: not-allowed; }
    .punch-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }

    /* Sync */
    .sync-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .sync-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    #gas-url-input {
      flex: 1; min-width: 200px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; color: var(--text); font-size: .82rem;
      font-family: 'DM Mono', monospace; outline: none; transition: border-color .2s;
    }
    #gas-url-input:focus { border-color: var(--accent2); }
    #gas-url-input::placeholder { color: var(--muted); }
    .btn {
      border: none; border-radius: 10px; padding: 11px 22px;
      font-family: 'Noto Sans JP', sans-serif; font-size: .88rem;
      font-weight: 700; cursor: pointer; transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sync { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: var(--bg); letter-spacing: .04em; }
    .btn-sync:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,169,110,.3); }
    .btn-sync:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-danger { background: rgba(224,108,117,.15); color: var(--danger); border: 1px solid rgba(224,108,117,.3); font-size: .78rem; padding: 8px 16px; }

    /* Log */
    .log-scroll { overflow-x: auto; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    thead tr { background: var(--surface2); }
    th { padding: 10px 12px; text-align: left; color: var(--muted); font-weight: 500; letter-spacing: .06em; font-size: .72rem; text-transform: uppercase; white-space: nowrap; }
    td { padding: 10px 12px; border-top: 1px solid var(--border); white-space: nowrap; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: .7rem; font-weight: 700; letter-spacing: .04em; }
    .badge-day     { background: rgba(79,195,161,.15);  color: var(--day); }
    .badge-night   { background: rgba(123,140,222,.15); color: var(--night); }
    .badge-in      { background: rgba(86,201,135,.15);  color: var(--punch-in); }
    .badge-out     { background: rgba(224,108,117,.15); color: var(--punch-out); }
    .badge-synced   { background: rgba(86,201,135,.1);  color: var(--success); font-size: .65rem; }
    .badge-unsynced { background: rgba(200,169,110,.1); color: var(--accent2); font-size: .65rem; }
    .duration-cell    { font-family: 'DM Mono', monospace; color: var(--accent2); font-size: .78rem; }
    .duration-pending { color: var(--muted); font-size: .75rem; }
    .empty-log { text-align: center; padding: 40px; color: var(--muted); font-size: .88rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 14px 24px; border-radius: 40px;
      font-size: .88rem; font-weight: 500; z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; pointer-events: none;
    }
    #toast.show    { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger); }
    #toast.info    { border-color: var(--accent2); color: var(--accent2); }

    /* Animations */
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,.3); border-top-color: var(--bg);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    @media (max-width: 600px) {
      .punch-btn .punch-label { font-size: 1.1rem; }
      .punch-btn { padding: 22px 14px; }
      #clock-time { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <h1>KINTAI</h1>
      <div class="subtitle">勤怠打刻システム</div>
    </div>
    <div class="clock-block">
      <div id="clock-time">--:--:--</div>
      <div id="clock-date">----.--.--</div>
    </div>
  </header>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="net-dot"></div>
    <span class="status-label">ネット:</span>
    <span class="status-value" id="net-status">--</span>
    <span class="status-sep">｜</span>
    <span class="status-label">未同期:</span>
    <span id="unsync-count">0</span>
    <span class="status-label">件</span>
  </div>

  <!-- STEP 1: 従業員選択 -->
  <div class="section-label">STEP 1 ／ 従業員を選択</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <span style="font-size:.75rem;color:var(--muted);">従業員の追加・削除は管理画面で行えます</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="loadEmployees()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">↺ 更新</button>
        <a href="management.html" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:.75rem;text-decoration:none;transition:all .2s;" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">管理画面 →</a>
      </div>
    </div>
    <div class="employee-grid" id="employee-grid">
      <div class="emp-empty">管理画面で従業員を登録してください</div>
    </div>
  </div>

  <!-- STEP 2: 勤務種別 -->
  <div class="section-label">STEP 2 ／ 勤務種別を選択</div>
  <div class="card">
    <div class="shift-grid">
      <div class="shift-btn day" id="btn-day" onclick="selectShift('昼勤')">
        <div class="shift-icon">☀️</div>
        <div class="shift-name">昼　勤</div>
        <div class="shift-desc">日中シフト</div>
      </div>
      <div class="shift-btn night" id="btn-night" onclick="selectShift('夜勤')">
        <div class="shift-icon">🌙</div>
        <div class="shift-name">夜　勤</div>
        <div class="shift-desc">夜間シフト</div>
      </div>
    </div>
  </div>

  <!-- STEP 3: 打刻 -->
  <div class="section-label">STEP 3 ／ 打刻</div>
  <div class="card">
    <div class="selection-summary" id="selection-summary" style="display:none;">
      <span class="sum-tag" id="sum-emp">--</span>
      <span class="sum-arrow">›</span>
      <span class="sum-tag" id="sum-shift">--</span>
    </div>

    <div class="punch-grid">
      <button class="punch-btn in"  id="btn-in"  onclick="punch('出勤')" disabled>
        <span class="punch-icon">🟢</span>
        <span class="punch-label">出　勤</span>
        <span class="punch-sub">タップして打刻</span>
      </button>
      <button class="punch-btn out" id="btn-out" onclick="punch('退勤')" disabled>
        <span class="punch-icon">🔴</span>
        <span class="punch-label">退　勤</span>
        <span class="punch-sub">タップして打刻</span>
      </button>
    </div>
  </div>

  <!-- 同期 -->
  <div class="section-label">SYNC ／ Google Sheets 同期</div>
  <div class="sync-card">
    <div class="sync-row">
      <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." />
      <button class="btn btn-sync" id="btn-sync" onclick="syncData()">同期する</button>
    </div>
    <div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:.75rem;color:var(--muted);">GASのデプロイURLを入力してください</span>
      <button class="btn btn-danger" onclick="clearAllData()">全データ削除</button>
    </div>
  </div>

  <!-- ログ -->
  <div class="section-label">LOG ／ 打刻履歴</div>
  <div class="card">
    <div class="log-scroll">
      <table>
        <thead>
          <tr>
            <th>打刻日時（丸め後）</th>
            <th>従業員</th>
            <th>勤務種別</th>
            <th>打刻種別</th>
            <th>勤務時間</th>
            <th>同期</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="6" class="empty-log">打刻データがありません</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /#app -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  IndexedDB  (version 2)
// ══════════════════════════════════════════════
let db = null;

function initDB() {
  return new Promise((resolve, reject) => {
    // v3: employeesストアのkeyPathをnameからidに変更・wage/nightRateを追加
    const req = indexedDB.open('KintaiDB', 3);
    req.onupgradeneeded = e => {
      const d      = e.target.result;
      const oldVer = e.oldVersion;
      if (!d.objectStoreNames.contains('records')) {
        const s = d.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
        s.createIndex('synced', 'synced', { unique: false });
      }
      // v2→v3: employeesストアをid keyPathに変更
      if (d.objectStoreNames.contains('employees') && oldVer < 3) {
        d.deleteObjectStore('employees');
      }
      if (!d.objectStoreNames.contains('employees')) {
        const es = d.createObjectStore('employees', { keyPath: 'id' });
        es.createIndex('name', 'name', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror   = e => reject(e.target.error);
  });
}

/* Records */
const tx  = (mode) => db.transaction('records', mode).objectStore('records');
const emp = (mode) => db.transaction('employees', mode).objectStore('employees');

function idbReq(req) { return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); }); }

const addRecord    = r  => idbReq(tx('readwrite').add(r));
const updateRecord = r  => idbReq(tx('readwrite').put(r));
const getAllRecords = () => idbReq(tx('readonly').getAll());
const clearDB      = () => idbReq(tx('readwrite').clear());

function getUnsyncedRecords() {
  return new Promise((res, rej) => {
    const req = tx('readonly').index('synced').getAll(0);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function markSynced(ids, syncedAt) {
  return new Promise((resolve, reject) => {
    const store   = db.transaction('records', 'readwrite').objectStore('records');
    let   pending = ids.length;
    if (!pending) { resolve(); return; }
    ids.forEach(id => {
      const gr = store.get(id);
      gr.onsuccess = () => {
        const rec = gr.result; rec.synced = 1; rec.syncedAt = syncedAt;
        store.put(rec);
        if (--pending === 0) resolve();
      };
      gr.onerror = () => reject(gr.error);
    });
  });
}

/* Employees - { id, name, wage, nightRate } */
const getAllEmployeesRaw = () => idbReq(emp('readonly').getAll());
const getAllEmployees    = () => getAllEmployeesRaw().then(arr => arr.map(r => r.name));
const putEmployeeRaw    = empObj => idbReq(emp('readwrite').put(empObj));
const deleteEmployeeById= id     => idbReq(emp('readwrite').delete(id));
const clearEmployees    = ()     => idbReq(emp('readwrite').clear());

// ══════════════════════════════════════════════
//  時刻ユーティリティ
// ══════════════════════════════════════════════

/**
 * 15分単位で切り上げ
 *   10:00:00 → 10:00  (変化なし)
 *   10:00:01 → 10:15
 *   10:14:59 → 10:15
 *   10:15:00 → 10:15  (変化なし)
 *   10:15:01 → 10:30
 */
function roundUp15(date) {
  const d    = new Date(date);
  const mins = d.getMinutes();
  const secs = d.getSeconds();
  if (mins % 15 === 0 && secs === 0) return d;          // すでにぴったり
  const addSec = (15 - (mins % 15)) * 60 - secs;
  d.setSeconds(d.getSeconds() + addSec, 0);
  return d;
}

/**
 * 退勤打刻用：15分単位で切り捨て（超過分は切り捨て、繰り下げ）
 * 例:
 *   15:35:01 → 15:30  (切り捨て)
 *   15:44:59 → 15:30  (切り捨て)
 *   15:45:00 → 15:45  (変化なし、ぴったりの場合はそのまま)
 *   15:00:00 → 15:00  (変化なし)
 */
function roundDown15(date) {
  const d    = new Date(date);
  const mins = d.getMinutes();
  d.setMinutes(mins - (mins % 15), 0, 0); // 秒・ミリ秒も切り捨て
  return d;
}

const pad  = n => String(n).padStart(2, '0');
const hhmm = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;
const fmtDT = d =>
  `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
  `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

// ══════════════════════════════════════════════
//  Clock & time preview
// ══════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('clock-date').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ` +
    `${'日月火水木金土'[now.getDay()]}`;
}

// ══════════════════════════════════════════════
//  Network
// ══════════════════════════════════════════════
function updateNetStatus() {
  const on = navigator.onLine;
  document.getElementById('net-dot').className     = `status-dot ${on ? 'online' : 'offline'}`;
  document.getElementById('net-status').textContent = on ? 'オンライン' : 'オフライン';
}

// ══════════════════════════════════════════════
//  Employee UI  ― GSSマスターと同期
// ══════════════════════════════════════════════
let employees        = [];   // [{ id, name, wage, nightRate }]
let selectedEmployee = null;
let selectedShift    = null;

/** 起動時: GSSから取得 → IndexedDBキャッシュ → 表示 */
async function loadEmployees() {
  const gasUrl = localStorage.getItem('gasUrl') || '';
  if (gasUrl && navigator.onLine) {
    try {
      const res  = await fetch(`${gasUrl}?action=fetchEmployees`);
      const json = await res.json();
      if (json.status === 'ok' && json.employees) {
        await clearEmployees();
        for (const e of json.employees) await putEmployeeRaw(e);
        showToast('✅ 従業員リストを更新しました', 'success');
      }
    } catch (_) { /* オフライン時はキャッシュを使う */ }
  }
  employees = await getAllEmployeesRaw();
  renderEmployees();
}

function renderEmployees() {
  const grid = document.getElementById('employee-grid');
  if (!employees.length) {
    grid.innerHTML = '<div class="emp-empty">管理画面で従業員を登録してください</div>';
    return;
  }
  grid.innerHTML = employees.map(e => {
    const safeId  = `emp-${e.id}`;
    const sel     = selectedEmployee === e.name ? ' selected' : '';
    const escaped = e.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return `
      <div class="emp-item${sel}" id="${safeId}">
        <button class="emp-name-btn" data-name="${escaped}">${e.name}</button>
      </div>`;
  }).join('');
}

// 従業員の追加・削除は management.html の従業員マスタータブで行います



function selectEmployee(name) {
  selectedEmployee = name;
  document.querySelectorAll('.emp-item').forEach(el => el.classList.remove('selected'));
  const emp = employees.find(e => e.name === name);
  if (emp) {
    const el = document.getElementById(`emp-${emp.id}`);
    if (el) el.classList.add('selected');
  }
  updatePunchButtons();
}

function selectShift(shift) {
  selectedShift = shift;
  document.getElementById('btn-day').classList.toggle('selected',   shift === '昼勤');
  document.getElementById('btn-night').classList.toggle('selected', shift === '夜勤');
  updatePunchButtons();
}

function updatePunchButtons() {
  const ready = !!(selectedEmployee && selectedShift);
  document.getElementById('btn-in').disabled  = !ready;
  document.getElementById('btn-out').disabled = !ready;
  const sm = document.getElementById('selection-summary');
  if (ready) {
    sm.style.display = 'flex';
    document.getElementById('sum-emp').textContent = selectedEmployee;
    const st = document.getElementById('sum-shift');
    st.textContent = selectedShift;
    st.className   = `sum-tag ${selectedShift === '昼勤' ? 'day' : 'night'}`;
  } else {
    sm.style.display = 'none';
  }
}

// ══════════════════════════════════════════════
//  Punch & 勤務時間計算
// ══════════════════════════════════════════════
async function punch(type) {
  if (!selectedEmployee || !selectedShift) return;

  const now     = new Date();
  const rounded = type === '退勤' ? roundDown15(now) : roundUp15(now);
  // BUG-4対応: 日付キーは実際の打刻時刻(now)から取る
  // 23:46等の丸めで翌日になっても、勤怠上は当日扱いにする
  const day     = dateKey(now);

  const record = {
    employeeName:    selectedEmployee,
    shift:           selectedShift,
    punchType:       type,
    punchTimeRaw:    now.toISOString(),
    punchTime:       rounded.toISOString(),   // 記録・計算に使う丸め後
    date:            day,
    synced:          0,
    syncedAt:        null,
    durationMinutes: null,
  };

  try {
    // BUG-3対応: 出勤の二重打刻チェック
    if (type === '出勤') {
      const all = await getAllRecords();
      const alreadyIn = all.some(r =>
        r.employeeName === selectedEmployee &&
        r.shift        === selectedShift    &&
        r.date         === day              &&
        r.punchType    === '出勤'
      );
      if (alreadyIn) {
        showToast(`⚠️ ${selectedEmployee}（${selectedShift}）は既に出勤打刻済みです`, 'error');
        return;
      }
    }

    await addRecord(record);

    // 退勤打刻時に同日・同シフトの出勤と照合して勤務時間を計算
    if (type === '退勤') {
      const warnMsg = await tryCalcDuration(selectedEmployee, selectedShift, day);
      if (warnMsg) showToast(warnMsg, 'error');
    }

    const timeStr = hhmm(rounded);
    const rawStr  = hhmm(now);
    const diffMsg = timeStr !== rawStr ? ` (${rawStr}→${timeStr})` : '';
    showToast(`✅ ${selectedEmployee}（${selectedShift}）${type} [${timeStr}${diffMsg}]`, 'success');

    await refreshLog();
    await refreshUnsyncCount();

    // リセット
    selectedEmployee = null;
    selectedShift    = null;
    document.querySelectorAll('.emp-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('btn-day').classList.remove('selected');
    document.getElementById('btn-night').classList.remove('selected');
    updatePunchButtons();

  } catch (err) {
    console.error(err);
    showToast('❌ 記録に失敗しました', 'error');
  }
}

/**
 * 同一従業員・同一日・同一シフトの出勤レコードと退勤レコードが揃ったら
 * 両方に durationMinutes を書き込む。
 * @returns {string|null} エラーメッセージ or null（正常）
 */
async function tryCalcDuration(empName, shift, day) {
  const all = await getAllRecords();
  const targets = all.filter(r =>
    r.employeeName === empName && r.shift === shift && r.date === day
  );
  // 新しい順（id降順）で最初に見つかった出勤・退勤
  const sorted = [...targets].sort((a, b) => b.id - a.id);
  const outRec = sorted.find(r => r.punchType === '退勤');
  const inRec  = sorted.find(r => r.punchType === '出勤');

  // BUG-1対応: 出勤レコードがない場合は警告メッセージを返す
  if (!inRec) return '⚠️ 出勤打刻が見つかりません。先に出勤打刻を行ってください。';

  const diffMin = Math.round(
    (new Date(outRec.punchTime) - new Date(inRec.punchTime)) / 60000
  );

  // BUG-1対応: 退勤が出勤より早い（負の値）場合も警告を返す
  if (diffMin < 0) return '⚠️ 退勤時刻が出勤時刻より早くなっています。打刻内容を確認してください。';

  inRec.durationMinutes  = diffMin;
  outRec.durationMinutes = diffMin;
  // BUG-5対応: 同期済みレコードにdurationが後から確定した場合、再同期対象に戻す
  if (inRec.synced  === 1) { inRec.synced  = 0; inRec.syncedAt  = null; }
  if (outRec.synced === 1) { outRec.synced = 0; outRec.syncedAt = null; }
  await updateRecord(inRec);
  await updateRecord(outRec);
  return null;
}

// ══════════════════════════════════════════════
//  Log
// ══════════════════════════════════════════════
async function refreshLog() {
  const records = await getAllRecords();
  const tbody   = document.getElementById('log-body');
  if (!records.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-log">打刻データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = [...records].reverse().map(r => {
    const dt        = new Date(r.punchTime);
    const rawDt     = r.punchTimeRaw ? new Date(r.punchTimeRaw) : null;
    const rounded   = fmtDT(dt);
    const wasRounded = rawDt && hhmm(rawDt) !== hhmm(dt);
    const timeCell  = wasRounded
      ? `<span style="font-family:'DM Mono',monospace;font-size:.75rem;">${rounded}</span>
         <br><span style="font-size:.68rem;color:var(--muted);">元: ${hhmm(rawDt)}</span>`
      : `<span style="font-family:'DM Mono',monospace;font-size:.75rem;">${rounded}</span>`;

    const shiftCls = r.shift    === '昼勤' ? 'day'    : 'night';
    const punchCls = r.punchType === '出勤' ? 'in'     : 'out';
    const syncCls  = r.synced   === 1       ? 'synced' : 'unsynced';
    const syncLbl  = r.synced   === 1       ? '済'     : '未';

    let durCell;
    if (r.durationMinutes !== null && r.durationMinutes !== undefined) {
      const h = Math.floor(r.durationMinutes / 60);
      const m = r.durationMinutes % 60;
      durCell = `<span class="duration-cell">⏱ ${h > 0 ? h + 'h ' : ''}${m}m</span>`;
    } else {
      durCell = `<span class="duration-pending">—</span>`;
    }

    return `<tr>
      <td>${timeCell}</td>
      <td>${r.employeeName}</td>
      <td><span class="badge badge-${shiftCls}">${r.shift}</span></td>
      <td><span class="badge badge-${punchCls}">${r.punchType}</span></td>
      <td>${durCell}</td>
      <td><span class="badge badge-${syncCls}">${syncLbl}</span></td>
    </tr>`;
  }).join('');
}

async function refreshUnsyncCount() {
  const u = await getUnsyncedRecords();
  document.getElementById('unsync-count').textContent = u.length;
}

// ══════════════════════════════════════════════
//  Sync
// ══════════════════════════════════════════════
async function syncData() {
  const gasUrl = document.getElementById('gas-url-input').value.trim();
  if (!gasUrl) { showToast('⚠️ GASのURLを入力してください', 'info'); return; }
  if (!navigator.onLine) { showToast('❌ オフラインです', 'error'); return; }

  const unsynced = await getUnsyncedRecords();
  if (!unsynced.length) { showToast('✅ 未同期データはありません', 'success'); return; }

  const btn = document.getElementById('btn-sync');
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span>同期中...';

  try {
    const syncedAt = new Date().toISOString();
    const payload  = unsynced.map(r => ({
      id:              r.id,
      employeeName:    r.employeeName,
      shift:           r.shift,
      punchType:       r.punchType,
      punchTime:       r.punchTime,
      punchTimeRaw:    r.punchTimeRaw || r.punchTime,
      date:            r.date,
      durationMinutes: r.durationMinutes ?? null,
    }));

    const res  = await fetch(gasUrl, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'upsert', records: payload }),
    });
    const json = await res.json();
    if (json.status === 'ok') {
      await markSynced(unsynced.map(r => r.id), syncedAt);
      showToast(`✅ ${unsynced.length}件を同期しました`, 'success');
      await refreshLog();
      await refreshUnsyncCount();
    } else throw new Error(json.message || 'GASエラー');
  } catch (e) {
    showToast(`❌ 同期失敗: ${e.message}`, 'error');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = '同期する';
  }
}

// ══════════════════════════════════════════════
//  Clear
// ══════════════════════════════════════════════
async function clearAllData() {
  if (!confirm('全打刻データを削除します。よろしいですか？\n（この操作は取り消せません）')) return;
  await clearDB();
  showToast('🗑️ 全データを削除しました', 'info');
  await refreshLog();
  await refreshUnsyncCount();
}

// ══════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3400);
}

// ══════════════════════════════════════════════
//  Persistent GAS URL
// ══════════════════════════════════════════════
const gasInput = document.getElementById('gas-url-input');
gasInput.value = localStorage.getItem('gasUrl') || '';
gasInput.addEventListener('input', () => localStorage.setItem('gasUrl', gasInput.value.trim()));

// ══════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════
(async () => {
  await initDB();
  await loadEmployees();

  // 従業員グリッドのクリック委譲（名前選択のみ）
  document.getElementById('employee-grid').addEventListener('click', e => {
    const nameBtn = e.target.closest('.emp-name-btn');
    if (nameBtn) selectEmployee(nameBtn.dataset.name);
  });

  updateClock();
  setInterval(updateClock, 1000);
  updateNetStatus();
  window.addEventListener('online',  updateNetStatus);
  window.addEventListener('offline', updateNetStatus);
  await refreshLog();
  await refreshUnsyncCount();
})();
</script>
